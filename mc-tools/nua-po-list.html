<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap"
    rel="stylesheet">
  <script>
    if (window.self !== window.top) {
      document.documentElement.classList.add('is-embedded');
    }

    // Enforce Authentication
    (function enforceAuth() {
      try {
        const sessionStr = sessionStorage.getItem('nua_auth');
        if (!sessionStr) throw new Error("No session");
        const session = JSON.parse(sessionStr);
        if (session.expires < Date.now()) throw new Error("Session expired");
      } catch (e) {
        document.documentElement.innerHTML = `
          <div style="font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #fdfdfd; color: #2C3E50;">
            <h2 style="color: #d32f2f; margin-bottom: 10px;">Unauthorized Access</h2>
            <p style="font-size: 1.1rem; margin-bottom: 20px;">You must log in through the MC Dashboard to view this tool.</p>
            <p style="font-size: 0.9rem; opacity: 0.7;">Redirecting to dashboard...</p>
          </div>
        `;
        setTimeout(() => {
          window.top.location.href = '../mc-members.html';
        }, 2000);
      }
    })();
  </script>
  <style>
    body { background: transparent; padding: 20px; text-align: center; font-family: 'Outfit', sans-serif; }
    button { background: var(--brand-primary); color: #fff; font-weight: 600; cursor: pointer; padding: 10px 20px; border-radius: 6px; border: none; margin-top: 20px; }
    button:hover { opacity: 0.9; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    .table-responsive { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; color: var(--text-primary); }
    th { background: var(--brand-secondary); color: #fff; }
    #loading { display: none; font-size: 1.1rem; color: var(--brand-primary); margin-top: 15px; }
    form { margin-top: 30px; text-align: left; }
    label { display: block; margin-top: 10px; }
    input, textarea { width: 100%; padding: 6px; margin-top: 4px; }
  </style>
</head>

<body>
  <h2>Purchase Order Log Viewer</h2>
  <div style="margin-bottom: 15px;">
      <input type="text" id="poSearch" placeholder="Search POs (e.g. vendor name, PO#, xyz)..." style="padding: 10px; width: 80%; max-width: 400px; border-radius: 6px; border: 1px solid #ccc;">
  </div>

  <form id="poForm">
    <label for="month">Month:</label>
    <select id="month" name="month">
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6">June</option>
      <option value="7">July</option>
      <option value="8">August</option>
      <option value="9">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>

    <label for="year">Year:</label>
    <select id="year" name="year">
      <option value="2025">2025</option>
      <option value="2026" selected>2026</option>
      <option value="2027">2027</option>
    </select>

    <button type="submit">Get POs</button>
  </form>

  <div id="results"></div>

  <script>
    document.getElementById("poForm").addEventListener("submit", function(e) {
      e.preventDefault();

      var month = document.getElementById("month").value;
      var year = document.getElementById("year").value;

      var url = "https://script.google.com/macros/s/AKfycbwTjMpJq8fqKuw-tODyS1nUJP7xX7zeKTbeT5V7C18FpVQyjCREaWsMV2yzcnTpLCDb/exec?month=" + month + "&year=" + year;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            document.getElementById("results").innerHTML = "<p style='color:red'>" + data.error + "</p>";
            return;
          }

          var pos = data.purchaseOrders;
          if (!pos || pos.length === 0) {
            document.getElementById("results").innerHTML = "<p>No POs found for " + month + "/" + year + "</p>";
            return;
          }

          // Build table
          var table = "<table><thead><tr>";
          var headers = Object.keys(pos[0]);
          headers.forEach(h => { table += "<th>" + h + "</th>"; });
          table += "</tr></thead><tbody>";

          pos.forEach(po => {
            table += "<tr>";
            headers.forEach(h => { table += "<td>" + (po[h] || "") + "</td>"; });
            table += "</tr>";
          });

          table += "</tbody></table>";
          document.getElementById("results").innerHTML = table;
        })
        .catch(err => {
          document.getElementById("results").innerHTML = "<p style='color:red'>Error: " + err + "</p>";
        });
    });

    document.getElementById("poSearch").addEventListener("input", function() {
        const filter = this.value.toLowerCase();
        const rows = document.querySelectorAll("#results table tr");
        rows.forEach((row) => {
            if (row.querySelector('th')) return; // Skip headers
            const text = row.textContent.toLowerCase();
            if (text.includes(filter)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    });
  </script>

<script>
    function applyDataLabels() {
        document.querySelectorAll('.table-responsive table').forEach(table => {
            const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
            table.querySelectorAll('tbody tr').forEach(row => {
                Array.from(row.querySelectorAll('td')).forEach((td, index) => {
                    if (headers[index] && !td.hasAttribute('data-label')) {
                        td.setAttribute('data-label', headers[index]);
                    }
                });
            });
        });
    }
    document.addEventListener('DOMContentLoaded', applyDataLabels);
    const observer = new MutationObserver(() => {
        // Debounce to prevent excessive calls
        clearTimeout(window.dataLabelTimeout);
        window.dataLabelTimeout = setTimeout(applyDataLabels, 100);
    });
    observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
