<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purchase Order Form</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <script>
    if (window.self !== window.top) {
      document.documentElement.classList.add('is-embedded');
    }

    // Enforce Authentication
    (function enforceAuth() {
      try {
        const sessionStr = sessionStorage.getItem('nua_auth');
        if (!sessionStr) throw new Error("No session");
        const session = JSON.parse(sessionStr);
        if (session.expires < Date.now()) throw new Error("Session expired");
      } catch (e) {
        document.documentElement.innerHTML = `
          <div style="font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #fdfdfd; color: #2C3E50;">
            <h2 style="color: #d32f2f; margin-bottom: 10px;">Unauthorized Access</h2>
            <p style="font-size: 1.1rem; margin-bottom: 20px;">You must log in through the MC Dashboard to view this tool.</p>
            <p style="font-size: 0.9rem; opacity: 0.7;">Redirecting to dashboard...</p>
          </div>
        `;
        setTimeout(() => {
          window.top.location.href = '../mc-members.html';
        }, 2000);
      }
    })();
  </script>
  <style>
    body { background: transparent; padding: 20px; text-align: center; font-family: 'Outfit', sans-serif; }
    form { max-width: 800px; margin: 0 auto; text-align: left; background: var(--bg-main); padding: 20px; border-radius: 12px; border: 1px solid var(--brand-secondary); }
    label { font-weight: 600; display: block; margin-top: 10px; }
    input, textarea, select, button { width: 100%; padding: 8px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
    button { background: var(--brand-primary); color: #fff; font-weight: 600; cursor: pointer; margin-top: 20px; }
    button:hover { opacity: 0.9; }
    .row { display: flex; gap: 15px; }
    .col { flex: 1; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: var(--brand-secondary); color: white; }
    .item-input { width: 100%; box-sizing: border-box; border: none; background: transparent; padding: 4px; }
    .item-input:focus { outline: 1px solid var(--brand-primary); }
    .remove-btn { background: #d32f2f; padding: 5px 10px; margin: 0; width: auto; font-size: 0.9rem; }
    .add-btn { background: var(--brand-secondary); width: auto; padding: 8px 15px; }
    #loading { display: none; font-size: 1.1rem; color: var(--brand-primary); margin-top: 15px; }
  </style>
</head>
<body class="moonlit-theme">
  <h2 style="color: var(--brand-primary); margin-bottom: 15px;">Submit Purchase Order</h2>
  
  <form id="poForm">
    <div class="row">
        <div class="col">
            <label>PO Date:</label>
            <input type="date" id="po_date" required>
        </div>
        <div class="col">
            <label>PO Number:</label>
            <input type="text" id="po_number" required>
        </div>
    </div>
    <div class="row">
        <div class="col">
            <label>Vendor:</label>
            <input type="text" id="po_vendor" required>
        </div>
    </div>
    
    <h3 style="margin-top: 20px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Items</h3>
    <table id="itemsTable">
      <thead>
        <tr>
          <th style="width: 10%;">SlNo.</th>
          <th style="width: 40%;">Item Description</th>
          <th style="width: 10%;">Qty</th>
          <th style="width: 15%;">Unit Price</th>
          <th style="width: 15%;">Total</th>
          <th style="width: 10%;">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="number" class="itemNo" value="1" required></td>
          <td><input type="text" class="description" required></td>
          <td><input type="number" class="qty" value="1" step="0.01" required oninput="calculateRowTotal(this)"></td>
          <td><input type="number" class="unitPrice" step="0.01" required oninput="calculateRowTotal(this)"></td>
          <td><input type="number" class="itemTotal" step="0.01" readonly></td>
          <td><button type="button" class="remove-btn" onclick="this.parentElement.parentElement.remove(); calculateGrandTotal();">X</button></td>
        </tr>
      </tbody>
    </table>
    <button type="button" class="add-btn" onclick="addItem()">+ Add Item</button>

    <div class="row" style="margin-top: 20px;">
        <div class="col">
            <label>Grand Total:</label>
            <input type="number" id="po_total_amount" step="0.01" readonly style="font-weight: bold; background: #f0f0f0;">
        </div>
    </div>
    
    <label>Comments (Optional):</label>
    <textarea id="po_comments" rows="3"></textarea>

    <button type="submit">Submit Purchase Order</button>
  </form>

  <div id="loading">⏳ Processing your request...</div>
  <div id="response" style="margin-top: 20px;"></div>

  <script>
    function calculateRowTotal(el) {
        const row = el.closest('tr');
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const price = parseFloat(row.querySelector('.unitPrice').value) || 0;
        row.querySelector('.itemTotal').value = (qty * price).toFixed(2);
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        let total = 0;
        document.querySelectorAll('.itemTotal').forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById('po_total_amount').value = total.toFixed(2);
    }

    function addItem() {
      const table = document.getElementById("itemsTable").getElementsByTagName("tbody")[0];
      const rowCount = table.rows.length + 1;
      const row = table.insertRow();
      row.innerHTML = `
        <td><input type="number" class="itemNo" value="${rowCount}" required></td>
        <td><input type="text" class="description" required></td>
        <td><input type="number" class="qty" value="1" step="0.01" required oninput="calculateRowTotal(this)"></td>
        <td><input type="number" class="unitPrice" step="0.01" required oninput="calculateRowTotal(this)"></td>
        <td><input type="number" class="itemTotal" step="0.01" readonly></td>
        <td><button type="button" class="remove-btn" onclick="this.parentElement.parentElement.remove(); calculateGrandTotal();">X</button></td>
      `;
    }

    document.getElementById("poForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      document.getElementById("loading").style.display = "block";

      const items = [];
      document.querySelectorAll("#itemsTable tbody tr").forEach(function(row) {
        items.push({
          itemNo: row.querySelector(".itemNo").value,
          description: row.querySelector(".description").value,
          qty: row.querySelector(".qty").value,
          unitPrice: row.querySelector(".unitPrice").value,
          itemTotal: row.querySelector(".itemTotal").value
        });
      });

      const payload = {
        po_date: document.getElementById("po_date").value,
        po_number: document.getElementById("po_number").value,
        po_vendor: document.getElementById("po_vendor").value,
        po_total_amount: document.getElementById("po_total_amount").value,
        po_comments: document.getElementById("po_comments").value,
        po_items: items
      };

      try {
        const response = await fetch("https://script.google.com/macros/s/AKfycbwTjMpJq8fqKuw-tODyS1nUJP7xX7zeKTbeT5V7C18FpVQyjCREaWsMV2yzcnTpLCDb/exec/exec", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            mode: 'no-cors'
        });
        
        // Since we are using no-cors, we won't get a readable JSON response.
        alert("Purchase Order submitted successfully!");
        document.getElementById("poForm").reset();
        document.getElementById("itemsTable").getElementsByTagName("tbody")[0].innerHTML = `
            <tr>
              <td><input type="number" class="item-input itemNo" value="1" required></td>
              <td><input type="text" class="item-input description" required></td>
              <td><input type="number" class="item-input qty" value="1" step="0.01" required oninput="calculateRowTotal(this)"></td>
              <td><input type="number" class="item-input unitPrice" step="0.01" required oninput="calculateRowTotal(this)"></td>
              <td><input type="number" class="item-input itemTotal" step="0.01" readonly></td>
              <td><button type="button" class="remove-btn" onclick="this.parentElement.parentElement.remove(); calculateGrandTotal();">X</button></td>
            </tr>
        `;
        calculateGrandTotal();
      } catch (err) {
        alert("Error submitting PO: " + err);
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    });
  </script>

<script>
    function applyDataLabels() {
        document.querySelectorAll('.table-responsive table, table').forEach(table => {
            const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
            table.querySelectorAll('tbody tr').forEach(row => {
                Array.from(row.querySelectorAll('td')).forEach((td, index) => {
                    if (headers[index] && !td.hasAttribute('data-label')) {
                        td.setAttribute('data-label', headers[index]);
                    }
                });
            });
        });
    }
    document.addEventListener('DOMContentLoaded', applyDataLabels);
    const observer = new MutationObserver(() => {
        clearTimeout(window.dataLabelTimeout);
        window.dataLabelTimeout = setTimeout(applyDataLabels, 100);
    });
    observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>
