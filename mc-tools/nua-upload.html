<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        if (window.self !== window.top) {
            document.documentElement.classList.add('is-embedded');
        }

        // Enforce Authentication
        (function enforceAuth() {
            try {
                const sessionStr = sessionStorage.getItem('nua_auth');
                if (!sessionStr) throw new Error("No session");
                const session = JSON.parse(sessionStr);
                if (session.expires < Date.now()) throw new Error("Session expired");
            } catch (e) {
                document.documentElement.innerHTML = `
                    <div style="font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #fdfdfd; color: #2C3E50;">
                        <h2 style="color: #d32f2f; margin-bottom: 10px;">Unauthorized Access</h2>
                        <p style="font-size: 1.1rem; margin-bottom: 20px;">You must log in through the MC Dashboard to view this tool.</p>
                        <p style="font-size: 0.9rem; opacity: 0.7;">Redirecting to dashboard...</p>
                    </div>
                `;
                setTimeout(() => {
                    window.top.location.href = '../mc-members.html';
                }, 2000);
            }
        })();
    </script>
    <style>
        body { background: transparent; padding: 20px; color: var(--text-primary); }
        .mc-tool-container { max-width: 800px; margin: 0 auto; }
        .upload-card { background: var(--bg-secondary); padding: 40px; border-radius: 12px; border: 1px solid rgba(45, 90, 39, 0.1); box-shadow: var(--shadow-soft); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--brand-primary); }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--brand-secondary); border-radius: 8px; font-family: inherit; background: var(--bg-main); color: var(--text-primary); }
        .form-control:focus { outline: none; border-color: var(--brand-primary); box-shadow: 0 0 0 2px rgba(45, 90, 39, 0.1); }
        .btn-action { display: inline-block; padding: 12px 25px; background: var(--brand-primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Outfit', sans-serif; font-size: 1rem; }
        .btn-action:hover { background: var(--brand-secondary); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .file-drop-area { border: 2px dashed var(--brand-secondary); border-radius: 12px; padding: 40px; text-align: center; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.3s; }
        .file-drop-area:hover { background: rgba(45, 90, 39, 0.05); border-color: var(--brand-primary); }
        .file-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        
        body.moonlit-theme .upload-card { background: var(--bg-secondary); border-color: rgba(255,255,255,0.1); }
        body.moonlit-theme .file-drop-area { background: rgba(0,0,0,0.2); }
        body.moonlit-theme .file-drop-area:hover { background: rgba(0,0,0,0.4); border-color: var(--brand-secondary); }
    </style>
</head>
<body class="moonlit-theme">
    <div class="mc-tool-container animate-slide-up">
        <div class="section-header" style="margin-bottom: 30px;">
            <img src="../assets/leaf.svg" alt="" class="leaf-motif left">
            <h2>Upload Document</h2>
            <img src="../assets/leaf.svg" alt="" class="leaf-motif right">
        </div>

        <div class="upload-card">
            <form id="uploadForm" onsubmit="event.preventDefault(); alert('Upload functionality will be integrated with backend soon.');">
                <div class="form-group">
                    <label for="docTitle">Document Title</label>
                    <input type="text" id="docTitle" class="form-control" placeholder="Enter document title" required>
                </div>
                
                <div class="form-group">
                    <label for="docCategory">Category</label>
                    <select id="docCategory" class="form-control" required>
                        <option value="">Select Category</option>
                        <option value="Meeting Minutes">Meeting Minutes</option>
                        <option value="Financials">Financials</option>
                        <option value="Policies">Policies / Bye-laws</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Select File</label>
                    <div class="file-drop-area" onclick="document.getElementById('fileInput').click()">
                        <span class="file-icon">📄</span>
                        <p style="margin: 0; font-weight: 600;">Click to select or drag and drop</p>
                        <p style="margin: 5px 0 0; font-size: 0.85rem; opacity: 0.7;">PDF, DOCX, XLSX (Max 10MB)</p>
                        <input type="file" id="fileInput" style="display: none;" accept=".pdf,.doc,.docx,.xls,.xlsx">
                    </div>
                </div>

                <div style="text-align: right; margin-top: 30px;">
                    <button type="submit" class="btn-action">Upload Document</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
