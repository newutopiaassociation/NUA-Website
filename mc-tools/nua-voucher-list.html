<body class="moonlit-theme">
    <h2 style="color: var(--brand-primary); margin-bottom: 15px;">Latest Payment Vouchers</h2>
    <div style="margin-bottom: 15px;">
        <input type="text" id="voucherSearch" placeholder="Search vouchers (e.g. vendor name, amount, xyz)..." style="padding: 10px; width: 80%; max-width: 400px; border-radius: 6px; border: 1px solid #ccc;">
    </div>
    <button id="listVouchers">Get Latest 10 Vouchers</button>
    <div id="loading">⏳ Loading vouchers...</div>
    <div id="voucherLog"></div>

    <script>
        document.getElementById("listVouchers").addEventListener("click", async () => {
            document.getElementById("loading").style.display = "block";
            document.getElementById("voucherLog").innerHTML = "";

            try {
                const token = sessionStorage.getItem('nua_token');
                const headers = {};
                const response = await fetch("https://script.google.com/macros/s/AKfycbwTjMpJq8fqKuw-tODyS1nUJP7xX7zeKTbeT5V7C18FpVQyjCREaWsMV2yzcnTpLCDb/exec/exec?action=log", { headers }); // replace with your GAS web app URL
                const data = await response.json();

                if (data.status === "success" && Array.isArray(data.vouchers) && data.vouchers.length > 0) {
                    let html = "<div class='table-responsive'><table><tr>";
                    html += Object.keys(data.vouchers[0]).map(h => `<th>${h}</th>`).join("");
                    html += "</tr>";

                    data.vouchers.forEach(v => {
                        html += "<tr>";
                        Object.keys(v).forEach((key, i) => {
                            let val = v[key];
                            // If this is the Voucher Link column, render as anchor
                            if (key.toLowerCase().includes("voucher link") && val) {
                                html += `<td><a href="${val}" target="_blank">Open Voucher</a></td>`;
                            } else {
                                html += `<td>${val}</td>`;
                            }
                        });
                        html += "</tr>";
                    });

                    html += "</table></div>";
                    document.getElementById("voucherLog").innerHTML = html;
                } else {
                    document.getElementById("voucherLog").innerText = "No vouchers found.";
                }

            } catch (err) {
                document.getElementById("voucherLog").innerText = "Error: " + err.message;
            } finally {
                document.getElementById("loading").style.display = "none";
            }
        });

        document.getElementById("voucherSearch").addEventListener("input", function() {
            const filter = this.value.toLowerCase();
            const rows = document.querySelectorAll("#voucherLog table tr");
            rows.forEach((row) => {
                if (row.querySelector('th')) return; // Skip headers
                const text = row.textContent.toLowerCase();
                if (text.includes(filter)) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        });
    </script>

<script>
    function applyDataLabels() {
        document.querySelectorAll('.table-responsive table').forEach(table => {
            const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
            table.querySelectorAll('tbody tr').forEach(row => {
                Array.from(row.querySelectorAll('td')).forEach((td, index) => {
                    if (headers[index] && !td.hasAttribute('data-label')) {
                        td.setAttribute('data-label', headers[index]);
                    }
                });
            });
        });
    }
    document.addEventListener('DOMContentLoaded', applyDataLabels);
    const observer = new MutationObserver(() => {
        // Debounce to prevent excessive calls
        clearTimeout(window.dataLabelTimeout);
        window.dataLabelTimeout = setTimeout(applyDataLabels, 100);
    });
    observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
