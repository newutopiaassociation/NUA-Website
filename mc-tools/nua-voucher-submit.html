<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <script>
        if (window.self !== window.top) {
            document.documentElement.classList.add('is-embedded');
        }

        // Enforce Authentication
        (function enforceAuth() {
            try {
                const sessionStr = sessionStorage.getItem('nua_auth');
                if (!sessionStr) throw new Error("No session");
                const session = JSON.parse(sessionStr);
                if (session.expires < Date.now()) throw new Error("Session expired");
            } catch (e) {
                document.documentElement.innerHTML = `
                    <div style="font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #fdfdfd; color: #2C3E50;">
                        <h2 style="color: #d32f2f; margin-bottom: 10px;">Unauthorized Access</h2>
                        <p style="font-size: 1.1rem; margin-bottom: 20px;">You must log in through the MC Dashboard to view this tool.</p>
                        <p style="font-size: 0.9rem; opacity: 0.7;">Redirecting to dashboard...</p>
                    </div>
                `;
                setTimeout(() => {
                    window.top.location.href = '../mc-members.html';
                }, 2000);
            }
        })();
    </script>
    <style>
        body {
            background: transparent;
            padding: 20px;
            text-align: center;
            font-family: 'Outfit', sans-serif;
        }

        form {
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
            background: var(--bg-main);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--brand-secondary);
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 10px;
        }

        input,
        button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: var(--brand-primary);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        small {
            color: gray;
        }
    </style>
</head>

<body class="moonlit-theme">
    <h2 style="color: var(--brand-primary); margin-bottom: 15px;">Voucher Entry Form</h2>
    <form id="voucherForm">
        <label>Voucher Number:</label>
        <input type="text" id="voucherNumber" name="voucherNumber" disabled>
        <small>This will be updated automatically by the system</small>

        <label>Amount:</label>
        <input type="number" name="vendorAmount" required>

        <label>Amount in Words:</label>
        <input type="text" name="vendorsAmountText" required>

        <label>Payment Mode:</label>
        <div>
            <input type="radio" name="paymentMode" value="cash"> Cash
            <input type="radio" name="paymentMode" value="cheque"> Cheque
        </div>

        <label>Cheque Number (if cheque):</label>
        <input type="text" name="vendorChequeNumber">

        <label>Item Description:</label>
        <input type="text" name="vendorItemDescription" required>

        <label>Voucher Date:</label>
        <input type="date" name="vendorVoucherDate" required>

        <label>Receiver:</label>
        <input type="text" name="vendorReceiver" required>

        <label>Receiver Email:</label>
        <input type="email" name="voucherToEmailID" required>

        <button type="submit">Send Voucher</button>
    </form>
    <div id="loading" style="display:none; font-size:1.1rem; color:var(--brand-primary); margin-top:15px;">
        ⏳ Processing your request...
    </div>
    <p id="result"></p>

    <script>
        const form = document.getElementById("voucherForm");

        // Load current voucher number from doGet endpoint
        async function loadVoucherNumber() {
            try {
                const token = sessionStorage.getItem('nua_token');
                const headers = {};
                const response = await fetch("https://script.google.com/macros/s/AKfycbxd4sk0zFku0aMaZUNIgeNYlm-hhlxT9PQeWe9ytuypQkFXFhQxKkwtx4AZQp-J8QEM/exec", { headers });
                const data = await response.json();
                if (data.status === "success") {
                    document.getElementById("voucherNumber").value = data.voucherNumber;
                } else {
                    document.getElementById("voucherNumber").value = "Error loading number";
                }
            } catch (err) {
                document.getElementById("voucherNumber").value = "Error";
            }
        }
        loadVoucherNumber();

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            document.getElementById("loading").style.display = "block"; // show spinner

            const data = {
                vendorAmount: form.vendorAmount.value,
                vendorsAmountText: form.vendorsAmountText.value,
                vendorByCash: form.paymentMode.value === "cash",
                vendorByCheque: form.paymentMode.value === "cheque",
                vendorChequeNumber: form.vendorChequeNumber.value,
                vendorItemDescription: form.vendorItemDescription.value,
                vendorVoucherDate: form.vendorVoucherDate.value,
                vendorReceiver: form.vendorReceiver.value,
                voucherToEmailID: form.voucherToEmailID.value
            };

            try {
                const token = sessionStorage.getItem('nua_token');
                const headers = {};
                const response = await fetch("https://script.google.com/macros/s/AKfycbxd4sk0zFku0aMaZUNIgeNYlm-hhlxT9PQeWe9ytuypQkFXFhQxKkwtx4AZQp-J8QEM/exec", {
                    method: "POST",
                    headers: headers,
                    body: JSON.stringify(data)
                });
                const resultText = await response.text();
                // document.getElementById("result").innerText = resultText;
                alert(resultText);   // popup
                form.reset();        // reset form
                loadVoucherNumber(); // reload voucher number
            } catch (err) {
                // document.getElementById("result").innerText = "Error: " + err.message;
                alert("Error: " + err.message);
            } finally {
                document.getElementById("loading").style.display = "none"; // hide spinner
            }
        });
    </script>
</body>

</html>
